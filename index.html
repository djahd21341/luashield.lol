<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuaShield - Script Protector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: #e0e0e0;
            position: relative;
            overflow-x: hidden;
        }

        /* Import Inter font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        /* Snowflake Animation */
        .snowflake {
            position: fixed;
            color: #fff;
            user-select: none;
            pointer-events: none;
            opacity: 0.3;
            font-size: 1.5em;
            animation: fall linear infinite;
            z-index: 1;
        }

        @keyframes fall {
            from {
                transform: translateY(-100vh) rotate(0deg);
            }
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Auth Styles */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-box {
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-box h2 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #80b3ff, #b380ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #808080;
            transition: all 0.3s;
        }

        .auth-tab.active {
            color: #80b3ff;
            border-bottom: 2px solid #80b3ff;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #b0b0b0;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 14px;
            color: #e0e0e0;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #80b3ff;
            box-shadow: 0 0 10px rgba(128, 179, 255, 0.3);
        }

        .form-group textarea {
            min-height: 200px;
            font-family: 'Courier New', monospace;
        }

        /* ===== MODERN BUTTON STYLES ===== */
        .btn {
            position: relative;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            border: none;
            outline: none;
            transition: all 0.2s ease;
            background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
            color: #e0e0e0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4a6fa5, #3a5a8a);
            color: white;
            box-shadow: 0 4px 15px rgba(74, 111, 165, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #2e7d5e, #1e5d45);
            color: white;
            box-shadow: 0 4px 15px rgba(46, 125, 94, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #b0003a, #80002a);
            color: white;
            box-shadow: 0 4px 15px rgba(176, 0, 58, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #b76e2e, #8e4e1e);
            color: white;
            box-shadow: 0 4px 15px rgba(183, 110, 46, 0.4);
        }

        .btn-purple {
            background: linear-gradient(135deg, #6b4f8f, #4b3a6f);
            color: white;
            box-shadow: 0 4px 15px rgba(107, 79, 143, 0.4);
        }

        .btn-cyan {
            background: linear-gradient(135deg, #2a6f6f, #1a4f4f);
            color: white;
            box-shadow: 0 4px 15px rgba(42, 111, 111, 0.4);
        }

        .btn-glow {
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0% { box-shadow: 0 4px 15px rgba(74, 111, 165, 0.4); }
            50% { box-shadow: 0 4px 25px rgba(74, 111, 165, 0.8); }
            100% { box-shadow: 0 4px 15px rgba(74, 111, 165, 0.4); }
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-icon svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-large {
            padding: 16px 32px;
            font-size: 16px;
        }

        .btn-block {
            width: 100%;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Dashboard Styles */
        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .navbar {
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #80b3ff, #b380ff, #ff80b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .api-key {
            background: linear-gradient(135deg, #1a1a2a, #151520);
            padding: 8px 15px;
            border-radius: 30px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            color: #80b3ff;
            border: 1px solid rgba(128, 179, 255, 0.3);
            box-shadow: 0 0 20px rgba(128, 179, 255, 0.2);
        }

        .logout-btn {
            background: linear-gradient(135deg, #2a1a1a, #1a0f0f);
            border: 1px solid rgba(255, 128, 128, 0.3);
            color: #ff8080;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(255, 128, 128, 0.2);
        }

        .logout-btn:hover {
            background: linear-gradient(135deg, #3a1a1a, #2a0f0f);
            border-color: #ff8080;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 128, 128, 0.3);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.95), rgba(15, 15, 25, 0.95));
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(128, 179, 255, 0.1) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .stat-card h3 {
            color: #a0a0a0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            position: relative;
        }

        .stat-card .number {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #80b3ff, #b380ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        /* Scripts Section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            color: #e0e0e0;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .script-card {
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.95), rgba(15, 15, 25, 0.95));
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .script-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #80b3ff, #b380ff, #ff80b3);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .script-card:hover::after {
            transform: translateX(100%);
        }

        .script-card:hover {
            transform: translateY(-5px);
            border-color: rgba(128, 179, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .script-name {
            font-size: 20px;
            font-weight: 700;
            color: #e0e0e0;
            letter-spacing: -0.5px;
        }

        .script-status {
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .status-active {
            background: linear-gradient(135deg, rgba(64, 255, 128, 0.15), rgba(32, 128, 64, 0.15));
            color: #80ff80;
            border: 1px solid rgba(128, 255, 128, 0.3);
            box-shadow: 0 0 20px rgba(128, 255, 128, 0.2);
        }

        .status-inactive {
            background: linear-gradient(135deg, rgba(255, 128, 128, 0.15), rgba(128, 64, 64, 0.15));
            color: #ff8080;
            border: 1px solid rgba(255, 128, 128, 0.3);
            box-shadow: 0 0 20px rgba(255, 128, 128, 0.2);
        }

        .script-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            color: #a0a0a0;
            font-size: 13px;
        }

        .script-meta span {
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .execution-url {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 12px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            margin: 15px 0;
            word-break: break-all;
            border: 1px solid rgba(128, 179, 255, 0.2);
            color: #80b3ff;
            position: relative;
        }

        .free-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 10px;
            letter-spacing: 0.5px;
        }

        .free-forever {
            background: linear-gradient(135deg, rgba(64, 255, 128, 0.2), rgba(32, 128, 64, 0.2));
            color: #80ff80;
            border: 1px solid rgba(128, 255, 128, 0.3);
            box-shadow: 0 0 20px rgba(128, 255, 128, 0.2);
        }

        .free-temp {
            background: linear-gradient(135deg, rgba(255, 255, 128, 0.2), rgba(128, 128, 64, 0.2));
            color: #ffff80;
            border: 1px solid rgba(255, 255, 128, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 128, 0.2);
        }

        .hwid-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 10px;
            background: linear-gradient(135deg, rgba(128, 179, 255, 0.2), rgba(64, 89, 128, 0.2));
            color: #80b3ff;
            border: 1px solid rgba(128, 179, 255, 0.3);
        }

        /* Key Management */
        .keys-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.05);
        }

        .keys-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .keys-header h4 {
            font-size: 18px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .keys-list {
            max-height: 300px;
            overflow-y: auto;
            padding: 5px;
        }

        .key-item {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5));
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .key-item:hover {
            border-color: rgba(128, 179, 255, 0.3);
            transform: translateX(5px);
            box-shadow: -5px 5px 15px rgba(0, 0, 0, 0.3);
        }

        .key-info {
            flex: 1;
        }

        .key-value {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            font-weight: 600;
            color: #80b3ff;
            letter-spacing: 1px;
        }

        .key-details {
            display: flex;
            gap: 15px;
            margin-top: 5px;
            font-size: 11px;
        }

        .key-expires {
            color: #ff8080;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .key-uses {
            color: #80ff80;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .key-hwid {
            color: #b380ff;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .key-actions {
            display: flex;
            gap: 8px;
        }

        .generate-key-form {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .free-settings {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hwid-settings {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 179, 128, 0.2);
        }

        .hwid-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
            transition: .3s;
            border-radius: 34px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 2px;
            bottom: 2px;
            background: linear-gradient(135deg, #80b3ff, #b380ff);
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background: linear-gradient(135deg, #4a6fa5, #3a5a8a);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2a, #151525);
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
        }

        .modal-header h2 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #80b3ff, #b380ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #808080;
            transition: all 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-btn:hover {
            color: #ff8080;
            background: rgba(255, 128, 128, 0.1);
            transform: rotate(90deg);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 50px;
            color: #808080;
        }

        .error-message {
            background: linear-gradient(135deg, rgba(255, 128, 128, 0.1), rgba(128, 64, 64, 0.1));
            color: #ff8080;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid rgba(255, 128, 128, 0.3);
            backdrop-filter: blur(10px);
        }

        .success-message {
            background: linear-gradient(135deg, rgba(128, 255, 128, 0.1), rgba(64, 128, 64, 0.1));
            color: #80ff80;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid rgba(128, 255, 128, 0.3);
            backdrop-filter: blur(10px);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #3a3a4a, #2a2a3a);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #4a4a5a, #3a3a4a);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
            }
            
            .user-info {
                flex-direction: column;
            }
            
            .scripts-grid {
                grid-template-columns: 1fr;
            }
            
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Snowflakes will be added by JavaScript -->
    
    <div class="container">
        <!-- Auth Container -->
        <div id="authContainer" class="auth-container">
            <div class="auth-box">
                <h2>❄️ LuaShield ❄️</h2>
                
                <div class="auth-tabs">
                    <div class="auth-tab active" onclick="switchTab('login')">Login</div>
                    <div class="auth-tab" onclick="switchTab('register')">Register</div>
                </div>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <!-- Login Form -->
                <div id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter password">
                    </div>
                    <button class="btn btn-primary btn-block btn-glow" onclick="login()">
                        <span class="btn-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M11 7L9.6 8.4L12.2 11H2V13H12.2L9.6 15.6L11 17L16 12L11 7Z"/>
                                <path d="M20 19H12V21H20C21.1 21 22 20.1 22 19V5C22 3.9 21.1 3 20 3H12V5H20V19Z"/>
                            </svg>
                            Login
                        </span>
                    </button>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="registerUsername" placeholder="Choose username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" placeholder="Choose password">
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="registerConfirmPassword" placeholder="Confirm password">
                    </div>
                    <button class="btn btn-success btn-block" onclick="register()">
                        <span class="btn-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M15 12C17.21 12 19 10.21 19 8C19 5.79 17.21 4 15 4C12.79 4 11 5.79 11 8C11 10.21 12.79 12 15 12ZM6 10V7H4V10H1V12H4V15H6V12H9V10H6ZM15 14C12.33 14 7 15.34 7 18V20H23V18C23 15.34 17.67 14 15 14Z"/>
                            </svg>
                            Register
                        </span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard">
            <div class="navbar">
                <div class="logo">❄️ LuaShield Enterprise ❄️</div>
                <div class="user-info">
                    <div class="api-key" id="apiKeyDisplay">API Key: Loading...</div>
                    <div id="usernameDisplay"></div>
                    <button class="logout-btn" onclick="logout()">
                        <span class="btn-icon">
                            <svg viewBox="0 0 24 24" width="16" height="16">
                                <path fill="#ff8080" d="M17 7L15.59 8.41L18.17 11H8V13H18.17L15.59 15.58L17 17L22 12L17 7ZM4 5H12V3H4C2.9 3 2 3.9 2 5V19C2 20.1 2.9 21 4 21H12V19H4V5Z"/>
                            </svg>
                            Logout
                        </span>
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <h3>Total Scripts</h3>
                    <div class="number" id="totalScripts">0</div>
                </div>
                <div class="stat-card">
                    <h3>Active Scripts</h3>
                    <div class="number" id="activeScripts">0</div>
                </div>
                <div class="stat-card">
                    <h3>Total Executions</h3>
                    <div class="number" id="totalExecutions">0</div>
                </div>
            </div>

            <!-- Scripts Section -->
            <div class="section-header">
                <h2>Your Scripts</h2>
                <button class="btn btn-primary btn-glow" onclick="openCreateModal()">
                    <span class="btn-icon">
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M19 13H13V19H11V13H5V11H11V5H13V11H19V13Z"/>
                        </svg>
                        New Script
                    </span>
                </button>
            </div>

            <div id="scriptsGrid" class="scripts-grid">
                <!-- Scripts will be loaded here -->
            </div>

            <!-- Recent Executions -->
            <div class="executions-section">
                <div class="executions-header">
                    <h3>Recent Executions</h3>
                    <button class="btn btn-warning btn-small" onclick="cleanExecutions()">
                        <span class="btn-icon">
                            <svg viewBox="0 0 24 24" width="14" height="14">
                                <path fill="currentColor" d="M6 19C6 20.1 6.9 21 8 21H16C17.1 21 18 20.1 18 19V7H6V19ZM8 9H16V19H8V9ZM15.5 4L14.5 3H9.5L8.5 4H5V6H19V4H15.5Z"/>
                            </svg>
                            Clear Logs
                        </span>
                    </button>
                </div>
                <div id="recentExecutions" class="executions-list">
                    <!-- Executions will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Create/Edit Script Modal -->
        <div id="scriptModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Create New Script</h2>
                    <button class="close-btn" onclick="closeModal()">&times;</button>
                </div>
                
                <div class="form-group">
                    <label>Script Name</label>
                    <input type="text" id="scriptName" placeholder="Enter script name">
                </div>
                
                <div class="form-group">
                    <label>Script Content (Lua)</label>
                    <textarea id="scriptContent" placeholder="-- Your Lua script here"></textarea>
                </div>

                <div class="form-group" id="scriptIdField" style="display: none;">
                    <label>Script ID</label>
                    <input type="text" id="scriptId" readonly>
                </div>

                <div class="form-group" id="executionUrlField" style="display: none;">
                    <label>Execution URL (with key)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="executionUrl" readonly>
                        <button class="btn btn-cyan btn-small" onclick="copyExecutionUrl()">Copy</button>
                    </div>
                    <small style="color: #808080;">Usage: loadstring(game:HttpGet("URL?key=YOUR_KEY"))()</small>
                </div>

                <div class="btn-group">
                    <button class="btn btn-success" id="saveScriptBtn" onclick="saveScript()">
                        <span class="btn-icon">
                            <svg viewBox="0 0 24 24" width="18" height="18">
                                <path fill="currentColor" d="M17 3H5C3.89 3 3 3.9 3 5V19C3 20.1 3.89 21 5 21H19C20.1 21 21 20.1 21 19V7L17 3ZM19 19H5V5H16.17L19 7.83V19ZM12 12C10.34 12 9 13.34 9 15C9 16.66 10.34 18 12 18C13.66 18 15 16.66 15 15C15 13.34 13.66 12 12 12ZM6 6H15V10H6V6Z"/>
                            </svg>
                            Save Script
                        </span>
                    </button>
                    <button class="btn btn-danger" onclick="closeModal()">
                        <span class="btn-icon">
                            <svg viewBox="0 0 24 24" width="18" height="18">
                                <path fill="currentColor" d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41Z"/>
                            </svg>
                            Cancel
                        </span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Key Management Modal -->
        <div id="keyModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="keyModalTitle">Key Management</h2>
                    <button class="close-btn" onclick="closeKeyModal()">&times;</button>
                </div>
                
                <div id="keyManagementContent">
                    <!-- Key management content will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Create snowflakes
        function createSnowflakes() {
            const snowflakeChars = ['❄️', '❅', '❆', '✻', '✼', '❄️'];
            
            for (let i = 0; i < 30; i++) {
                const snowflake = document.createElement('div');
                snowflake.className = 'snowflake';
                snowflake.textContent = snowflakeChars[Math.floor(Math.random() * snowflakeChars.length)];
                snowflake.style.left = Math.random() * 100 + '%';
                snowflake.style.animationDuration = Math.random() * 5 + 5 + 's';
                snowflake.style.animationDelay = Math.random() * 5 + 's';
                snowflake.style.fontSize = Math.random() * 15 + 10 + 'px';
                snowflake.style.opacity = Math.random() * 0.2 + 0.1;
                document.body.appendChild(snowflake);
            }
        }

        createSnowflakes();

        let currentUser = null;
        let currentScriptId = null;
        let currentScriptData = null;

        // Check if user is logged in
        async function checkAuth() {
            try {
                const response = await fetch('/api/user');
                if (response.ok) {
                    const user = await response.json();
                    currentUser = user;
                    document.getElementById('authContainer').style.display = 'none';
                    document.getElementById('dashboard').classList.add('active');
                    document.getElementById('usernameDisplay').textContent = user.username;
                    document.getElementById('apiKeyDisplay').textContent = `API Key: ${user.apiKey}`;
                    loadDashboard();
                }
            } catch (err) {
                console.error('Auth check failed:', err);
            }
        }

        // Switch between login and register tabs
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.auth-tab').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        // Show error message
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }

        // Show success message
        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.style.display = 'block';
            setTimeout(() => {
                successEl.style.display = 'none';
            }, 5000);
        }

        // Login
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    showSuccess('Login successful!');
                    setTimeout(() => {
                        window.location.reload();
                    }, 1000);
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (err) {
                showError('Network error');
            }
        }

        // Register
        async function register() {
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;

            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    showSuccess('Registration successful! You can now login.');
                    switchTab('login');
                } else {
                    showError(data.error || 'Registration failed');
                }
            } catch (err) {
                showError('Network error');
            }
        }

        // Logout
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.reload();
        }

        // Load dashboard data
        async function loadDashboard() {
            await loadScripts();
            await loadStats();
        }

        // Load scripts
        async function loadScripts() {
            try {
                const response = await fetch('/api/scripts');
                const scripts = await response.json();
                
                const grid = document.getElementById('scriptsGrid');
                grid.innerHTML = '';

                if (scripts.length === 0) {
                    grid.innerHTML = '<div class="script-card" style="text-align: center;">No scripts yet. Create your first script!</div>';
                    return;
                }

                scripts.forEach(script => {
                    const card = document.createElement('div');
                    card.className = 'script-card';
                    
                    let freeBadge = '';
                    if (script.keyInfo.freeForever) {
                        freeBadge = '<span class="free-badge free-forever">✨ FREE FOREVER</span>';
                    } else if (script.keyInfo.freeUntil) {
                        const freeUntil = new Date(script.keyInfo.freeUntil);
                        freeBadge = `<span class="free-badge free-temp">⏰ FREE UNTIL ${freeUntil.toLocaleDateString()}</span>`;
                    }
                    
                    card.innerHTML = `
                        <div class="script-header">
                            <span class="script-name">${escapeHtml(script.name)} ${freeBadge}</span>
                            <span class="script-status ${script.active ? 'status-active' : 'status-inactive'}">
                                ${script.active ? '● ACTIVE' : '○ INACTIVE'}
                            </span>
                        </div>
                        <div class="script-meta">
                            <span>📋 ID: ${script.id}</span>
                            <span>🚀 Executions: ${script.executions || 0}</span>
                            <span>🔑 Keys: ${script.keyInfo.keyCount}</span>
                        </div>
                        <div class="execution-url">
                            <strong>⚡ Execute:</strong> loadstring(game:HttpGet("${window.location.origin}/raw/${script.id}?key=YOUR_KEY"))()
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-cyan btn-small" onclick="editScript('${script.id}')">
                                <span class="btn-icon">
                                    <svg viewBox="0 0 24 24" width="14" height="14">
                                        <path fill="currentColor" d="M3 17.25V21H6.75L17.81 9.94L14.06 6.19L3 17.25ZM20.71 7.04C21.1 6.65 21.1 6.02 20.71 5.63L18.37 3.29C17.98 2.9 17.35 2.9 16.96 3.29L15.13 5.12L18.88 8.87L20.71 7.04Z"/>
                                    </svg>
                                    Edit
                                </span>
                            </button>
                            <button class="btn btn-purple btn-small" onclick="manageKeys('${script.id}')">
                                <span class="btn-icon">
                                    <svg viewBox="0 0 24 24" width="14" height="14">
                                        <path fill="currentColor" d="M12.65 10C11.83 7.67 9.61 6 7 6C3.69 6 1 8.69 1 12C1 15.31 3.69 18 7 18C9.61 18 11.83 16.33 12.65 14H17V18H21V14H23V10H12.65ZM7 14C5.9 14 5 13.1 5 12C5 10.9 5.9 10 7 10C8.1 10 9 10.9 9 12C9 13.1 8.1 14 7 14Z"/>
                                    </svg>
                                    Keys
                                </span>
                            </button>
                            <button class="btn ${script.active ? 'btn-warning' : 'btn-success'} btn-small" onclick="toggleScript('${script.id}', ${!script.active})">
                                <span class="btn-icon">
                                    ${script.active ? 
                                        '<svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.58 20 4 16.42 4 12C4 7.58 7.58 4 12 4C16.42 4 20 7.58 20 12C20 16.42 16.42 20 12 20Z"/></svg>' : 
                                        '<svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.58 20 4 16.42 4 12C4 7.58 7.58 4 12 4C16.42 4 20 7.58 20 12C20 16.42 16.42 20 12 20Z"/><path fill="currentColor" d="M8 11H16V13H8z"/></svg>'
                                    }
                                    ${script.active ? 'Deactivate' : 'Activate'}
                                </span>
                            </button>
                            <button class="btn btn-danger btn-small" onclick="deleteScript('${script.id}')">
                                <span class="btn-icon">
                                    <svg viewBox="0 0 24 24" width="14" height="14">
                                        <path fill="currentColor" d="M6 19C6 20.1 6.9 21 8 21H16C17.1 21 18 20.1 18 19V7H6V19ZM8 9H16V19H8V9ZM15.5 4L14.5 3H9.5L8.5 4H5V6H19V4H15.5Z"/>
                                    </svg>
                                    Delete
                                </span>
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error('Failed to load scripts:', err);
            }
        }

        // Load stats
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                
                document.getElementById('totalScripts').textContent = stats.totalScripts;
                document.getElementById('activeScripts').textContent = stats.activeScripts;
                document.getElementById('totalExecutions').textContent = stats.totalExecutions;

                // Load recent executions
                const executionsEl = document.getElementById('recentExecutions');
                executionsEl.innerHTML = '';

                if (stats.recentExecutions.length === 0) {
                    executionsEl.innerHTML = '<div class="execution-item">No executions yet</div>';
                    return;
                }

                stats.recentExecutions.forEach(exec => {
                    const date = new Date(exec.timestamp);
                    const item = document.createElement('div');
                    item.className = 'execution-item';
                    item.innerHTML = `
                        <div class="execution-info">
                            <div class="execution-script">${escapeHtml(exec.scriptName || 'Unknown')}</div>
                            <div class="execution-time">${date.toLocaleString()}</div>
                            <div class="execution-ip">IP: ${exec.ip} | Key: ${exec.keyUsed || 'None'}</div>
                        </div>
                    `;
                    executionsEl.appendChild(item);
                });
            } catch (err) {
                console.error('Failed to load stats:', err);
            }
        }

        // Clean executions
        async function cleanExecutions() {
            if (!confirm('Are you sure you want to clear all execution logs? This cannot be undone.')) {
                return;
            }

            try {
                const response = await fetch('/api/clean-executions', {
                    method: 'POST'
                });

                if (response.ok) {
                    showSuccess('Execution logs cleaned successfully!');
                    loadStats();
                } else {
                    showError('Failed to clean executions');
                }
            } catch (err) {
                showError('Network error');
            }
        }

        // Open create modal
        function openCreateModal() {
            currentScriptId = null;
            document.getElementById('modalTitle').textContent = 'Create New Script';
            document.getElementById('scriptName').value = '';
            document.getElementById('scriptContent').value = '';
            document.getElementById('scriptIdField').style.display = 'none';
            document.getElementById('executionUrlField').style.display = 'none';
            document.getElementById('scriptModal').classList.add('active');
        }

        // Edit script
        async function editScript(scriptId) {
            try {
                const response = await fetch('/api/scripts');
                const scripts = await response.json();
                const script = scripts.find(s => s.id === scriptId);

                if (script) {
                    currentScriptId = scriptId;
                    document.getElementById('modalTitle').textContent = 'Edit Script';
                    document.getElementById('scriptName').value = script.name;
                    document.getElementById('scriptContent').value = script.originalContent || script.content;
                    document.getElementById('scriptId').value = script.id;
                    document.getElementById('executionUrl').value = `${window.location.origin}/raw/${script.id}?key=YOUR_KEY`;
                    document.getElementById('scriptIdField').style.display = 'block';
                    document.getElementById('executionUrlField').style.display = 'block';
                    document.getElementById('scriptModal').classList.add('active');
                }
            } catch (err) {
                console.error('Failed to load script:', err);
            }
        }

        // Save script
        async function saveScript() {
            const name = document.getElementById('scriptName').value;
            const content = document.getElementById('scriptContent').value;

            if (!name || !content) {
                showError('Please fill in all fields');
                return;
            }

            try {
                const url = currentScriptId ? `/api/scripts/${currentScriptId}` : '/api/scripts';
                const method = currentScriptId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, content })
                });

                if (response.ok) {
                    showSuccess('Script saved successfully!');
                    closeModal();
                    loadScripts();
                    loadStats();
                } else {
                    const data = await response.json();
                    showError(data.error || 'Failed to save script');
                }
            } catch (err) {
                showError('Network error');
            }
        }

        // Toggle script status
        async function toggleScript(scriptId, active) {
            try {
                const response = await fetch(`/api/scripts/${scriptId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ active })
                });

                if (response.ok) {
                    showSuccess(`Script ${active ? 'activated' : 'deactivated'}!`);
                    loadScripts();
                    loadStats();
                }
            } catch (err) {
                showError('Failed to update script');
            }
        }

        // Delete script
        async function deleteScript(scriptId) {
            if (!confirm('Are you sure you want to delete this script?')) {
                return;
            }

            try {
                const response = await fetch(`/api/scripts/${scriptId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showSuccess('Script deleted successfully!');
                    loadScripts();
                    loadStats();
                }
            } catch (err) {
                showError('Failed to delete script');
            }
        }

        // Manage keys
        async function manageKeys(scriptId) {
            try {
                const response = await fetch(`/api/scripts/${scriptId}/keys`);
                const keyData = await response.json();
                
                const scriptResponse = await fetch('/api/scripts');
                const scripts = await scriptResponse.json();
                const script = scripts.find(s => s.id === scriptId);
                
                currentScriptData = { scriptId, scriptName: script.name, keyData };
                
                const content = document.getElementById('keyManagementContent');
                
                let freeStatus = '';
                if (keyData.freeForever) {
                    freeStatus = '<span class="free-badge free-forever">✨ FREE FOREVER</span>';
                } else if (keyData.freeUntil) {
                    const freeUntil = new Date(keyData.freeUntil);
                    freeStatus = `<span class="free-badge free-temp">⏰ FREE UNTIL ${freeUntil.toLocaleString()}</span>`;
                } else {
                    freeStatus = '<span class="free-badge" style="background: rgba(255,128,128,0.15); color: #ff8080;">💰 PAID ONLY</span>';
                }
                
                let keysHtml = '';
                keyData.keys.forEach(k => {
                    const created = new Date(k.createdAt);
                    const expires = k.expiresAt ? new Date(k.expiresAt) : null;
                    keysHtml += `
                        <div class="key-item">
                            <div class="key-info">
                                <div class="key-value">🔑 ${k.key}</div>
                                <div class="key-details">
                                    <span class="key-uses">
                                        <svg viewBox="0 0 24 24" width="12" height="12">
                                            <path fill="#80ff80" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                                            <path fill="#80ff80" d="M12 6v6l4 2"/>
                                        </svg>
                                        Uses: ${k.used}${k.maxUses ? '/' + k.maxUses : ''}
                                    </span>
                                    ${expires ? `
                                        <span class="key-expires">
                                            <svg viewBox="0 0 24 24" width="12" height="12">
                                                <path fill="#ff8080" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                                                <path fill="#ff8080" d="M12 6v6l4 2"/>
                                            </svg>
                                            Expires: ${expires.toLocaleDateString()}
                                        </span>
                                    ` : ''}
                                    ${k.hwid ? `
                                        <span class="key-hwid">
                                            <svg viewBox="0 0 24 24" width="12" height="12">
                                                <path fill="#b380ff" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                                                <path fill="#b380ff" d="M12 6v6l4 2"/>
                                            </svg>
                                            HWID Locked
                                        </span>
                                    ` : ''}
                                </div>
                            </div>
                            <div class="key-actions">
                                ${!k.hwid ? `
                                    <button class="btn btn-purple btn-small" onclick="setHWID('${scriptId}', '${k.key}')">
                                        <span class="btn-icon">
                                            <svg viewBox="0 0 24 24" width="14" height="14">
                                                <path fill="currentColor" d="M18 8H17V6C17 3.24 14.76 1 12 1S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H9V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2z"/>
                                            </svg>
                                            Lock HWID
                                        </span>
                                    </button>
                                ` : ''}
                                <button class="btn btn-danger btn-small" onclick="deleteKey('${scriptId}', '${k.key}')">
                                    <span class="btn-icon">
                                        <svg viewBox="0 0 24 24" width="14" height="14">
                                            <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM8 9h8v10H8V9zm7.5-5l-1-1h-5l-1 1H5v2h14V4h-3.5z"/>
                                        </svg>
                                        Delete
                                    </span>
                                </button>
                            </div>
                        </div>
                    `;
                });
                
                content.innerHTML = `
                    <h3 style="margin-bottom: 20px;">${escapeHtml(script.name)} - Key Management ${freeStatus}</h3>
                    
                    <div class="free-settings">
                        <button class="btn ${keyData.freeForever ? 'btn-danger' : 'btn-success'}" onclick="setFreeForever('${scriptId}', ${!keyData.freeForever})">
                            <span class="btn-icon">
                                <svg viewBox="0 0 24 24" width="18" height="18">
                                    <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                                </svg>
                                ${keyData.freeForever ? 'Disable Free Forever' : 'Enable Free Forever'}
                            </span>
                        </button>
                        
                        <select id="freeHours" class="btn" style="width: auto; background: #2a2a3a;">
                            <option value="1">1 Hour</option>
                            <option value="6">6 Hours</option>
                            <option value="12">12 Hours</option>
                            <option value="24">24 Hours</option>
                            <option value="72">3 Days</option>
                            <option value="168">7 Days</option>
                        </select>
                        
                        <button class="btn btn-cyan" onclick="setFreeTemporary('${scriptId}')">
                            <span class="btn-icon">
                                <svg viewBox="0 0 24 24" width="18" height="18">
                                    <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                                    <path fill="currentColor" d="M12 6v6l4 2"/>
                                </svg>
                                Set Free Temporary
                            </span>
                        </button>
                    </div>

                    <div class="hwid-settings">
                        <h4 style="margin-bottom: 15px;">🔒 HWID Protection Settings</h4>
                        <div class="hwid-toggle">
                            <label class="toggle-switch">
                                <input type="checkbox" id="hwidEnabled" ${keyData.hwidEnabled ? 'checked' : ''} onchange="toggleHWID('${scriptId}')">
                                <span class="toggle-slider"></span>
                            </label>
                            <span style="margin-left: 10px;">Enable HWID Lock for all keys</span>
                        </div>
                        <p style="color: #a0a0a0; font-size: 12px; margin-top: 10px;">
                            When enabled, each key can only be used on one specific computer. 
                            Users will need to provide their HWID to get a key locked to their system.
                        </p>
                    </div>
                    
                    <div class="keys-section">
                        <div class="keys-header">
                            <h4>🔑 Generated Keys (${keyData.keys.length})</h4>
                            <button class="btn btn-success" onclick="generateKey('${scriptId}')">
                                <span class="btn-icon">
                                    <svg viewBox="0 0 24 24" width="18" height="18">
                                        <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                                    </svg>
                                    Generate New Key
                                </span>
                            </button>
                        </div>
                        
                        <div class="generate-key-form">
                            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                                <select id="keyDuration" style="flex: 1; padding: 10px; background: #1a1a2a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #e0e0e0;">
                                    <option value="">No Expiration</option>
                                    <option value="86400000">1 Day</option>
                                    <option value="604800000">7 Days</option>
                                    <option value="2592000000">30 Days</option>
                                </select>
                                
                                <input type="text" id="maxUses" placeholder="Max uses (leave empty for unlimited)" style="flex: 1; padding: 10px; background: #1a1a2a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #e0e0e0;">
                            </div>
                            <small style="color: #808080; display: block; margin-top: 10px;">Set maximum number of times this key can be used</small>
                        </div>
                        
                        <div class="keys-list">
                            ${keysHtml || '<div class="key-item" style="justify-content: center;">No keys generated yet</div>'}
                        </div>
                    </div>
                `;
                
                document.getElementById('keyModalTitle').textContent = '🔐 Key Management';
                document.getElementById('keyModal').classList.add('active');
            } catch (err) {
                console.error('Failed to load keys:', err);
                showError('Failed to load key management');
            }
        }

        // Toggle HWID
        async function toggleHWID(scriptId) {
            const enabled = document.getElementById('hwidEnabled').checked;
            try {
                const response = await fetch(`/api/scripts/${scriptId}/hwid`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled })
                });
                
                if (response.ok) {
                    showSuccess(`HWID lock ${enabled ? 'enabled' : 'disabled'}!`);
                } else {
                    showError('Failed to update HWID settings');
                }
            } catch (err) {
                showError('Network error');
            }
        }

        // Set HWID for key
        async function setHWID(scriptId, key) {
            const hwid = prompt('Enter the HWID to lock this key to:');
            if (!hwid) return;
            
            try {
                const response = await fetch(`/api/scripts/${scriptId}/keys/${key}/hwid`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hwid })
                });
                
                if (response.ok) {
                    showSuccess('HWID locked successfully!');
                    manageKeys(scriptId);
                } else {
                    showError('Failed to set HWID');
                }
            } catch (err) {
                showError('Network error');
            }
        }

        // Generate key
        async function generateKey(scriptId) {
            const duration = document.getElementById('keyDuration')?.value;
            const maxUses = document.getElementById('maxUses')?.value;
            
            try {
                const response = await fetch(`/api/scripts/${scriptId}/keys`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        duration: duration ? parseInt(duration) : null,
                        maxUses: maxUses ? parseInt(maxUses) : null
                    })
                });
                
                const data = await response.json();
                if (response.ok) {
                    showSuccess(`✨ Key generated: ${data.key}`);
                    manageKeys(scriptId);
                } else {
                    showError(data.error || 'Failed to generate key');
                }
            } catch (err) {
                showError('Network error');
            }
        }

        // Delete key
        async function deleteKey(scriptId, key) {
            if (!confirm('Are you sure you want to delete this key?')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/scripts/${scriptId}/keys/${key}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showSuccess('🗑️ Key deleted successfully');
                    manageKeys(scriptId);
                } else {
                    showError('Failed to delete key');
                }
            } catch (err) {
                showError('Network error');
            }
        }

        // Set free forever
        async function setFreeForever(scriptId, enabled) {
            try {
                const response = await fetch(`/api/scripts/${scriptId}/free/forever`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled })
                });
                
                if (response.ok) {
                    showSuccess(enabled ? '✨ Script is now free forever!' : 'Free forever disabled');
                    manageKeys(scriptId);
                    loadScripts();
                } else {
                    showError('Failed to update free status');
                }
            } catch (err) {
                showError('Network error');
            }
        }

        // Set free temporary
        async function setFreeTemporary(scriptId) {
            const hours = parseInt(document.getElementById('freeHours').value);
            
            try {
                const response = await fetch(`/api/scripts/${scriptId}/free/temporary`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hours })
                });
                
                if (response.ok) {
                    showSuccess(`⏰ Script is now free for ${hours} hours!`);
                    manageKeys(scriptId);
                    loadScripts();
                } else {
                    showError('Failed to set free status');
                }
            } catch (err) {
                showError('Network error');
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('scriptModal').classList.remove('active');
        }

        // Close key modal
        function closeKeyModal() {
            document.getElementById('keyModal').classList.remove('active');
        }

        // Copy execution URL
        function copyExecutionUrl() {
            const url = document.getElementById('executionUrl');
            url.select();
            document.execCommand('copy');
            showSuccess('📋 URL copied to clipboard!');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Check auth on load
        checkAuth();

        // Auto-refresh stats every 30 seconds
        setInterval(() => {
            if (currentUser) {
                loadStats();
            }
        }, 30000);
    </script>
</body>
</html>
